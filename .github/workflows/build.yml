# GitHub Actions CI для Yappari (десктоп)
#
# Прогоняет тесты, линтеры и собирает EXE-файл.
# Артефакты сборки доступны из Actions.

name: Build Yappari

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/tts/python/requirements-tts.txt

      - name: Install Python dependencies
        run: |
          pip install -r backend/tts/python/requirements-tts.txt

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run Go tests
        run: go test ./backend/... -count=1 -timeout 60s

      - name: TypeScript check
        run: cd frontend && npx vue-tsc -b

      - name: Lint Python code
        run: ruff check backend/tts/python/

      - name: Build with Wails
        run: wails build -clean -platform windows/amd64 -webview2 embed

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: yappari-windows-amd64
          path: build/bin/yappari.exe
          if-no-files-found: error
