# GitHub Actions CI для Yappari
#
# Собирает EXE при пуше в main и при создании тега v*.
# Артефакты сборки доступны для скачивания из Actions.
# При пуше тега (например, v0.2.0) автоматически создаётся GitHub Release.

name: Build Yappari

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run backend tests
        run: go test ./... -count=1 -timeout 60s

      - name: TypeScript check
        run: cd frontend && npx vue-tsc -b

      - name: Build with Wails
        run: wails build -clean -platform windows/amd64 -webview2 embed

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: yappari-windows-amd64
          path: build/bin/yappari.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/yappari.exe
          generate_release_notes: true
