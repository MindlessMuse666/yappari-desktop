# GitHub Actions CI для Yappari (веб-версия)
#
# Прогоняет тесты бэкенда и TypeScript-проверку
# при пуше в main/web и при PR в main/web.

name: CI

on:
  push:
    branches: [ main, web ]
  pull_request:
    branches: [ main, web ]

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run backend tests
        run: go test ./backend/... -count=1 -timeout 60s

      - name: TypeScript check
        run: cd frontend && npx vue-tsc -b --noEmit

      - name: Build frontend (production check)
        run: cd frontend && npm run build
